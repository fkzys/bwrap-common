name: CI

on:
  push:
    paths:
      - 'bwrap-common.sh'
      - 'tests/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'bwrap-common.sh'
      - 'tests/**'
      - '.github/workflows/ci.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: shellcheck -s bash -e SC2034,SC2178,SC2317 bwrap-common.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/test.sh
